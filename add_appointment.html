<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="styles/bookappoinment.css">
  <title>Book Appointment</title>
   
</head>
<body>

  <div class="container">
    <h2>Appointment Form</h2>
    <form method="POST">
      <!-- Donor Dropdown -->
      <label>Donor</label>
      <select name="donor" required>
        <option value="">Select Donor</option>
        <option value="1">John Doe</option>
        <option value="2">Jane Smith</option>
        <option value="3">Mike Johnson</option>
      </select>

      <!-- Recipient Dropdown -->
      <label>Recipient</label>
      <select name="user" required>
        <option value="">Select Recipient</option>
        <option value="1">Alice Brown</option>
        <option value="2">Bob Wilson</option>
        <option value="3">Carol Davis</option>
      </select>

      <label>Full Name</label>
      <input type="text" name="full_name" required>

      <label>Phone Number</label>
      <input type="tel" name="phone" required>

      <label>Date</label>
      <input type="date" name="date" required>

      <label>Time</label>
      <input type="time" name="time" required>

      <label>Location</label>
      <input type="text" name="location" required>

      <label>Blood Group</label>
      <select name="blood_group" required>
        <option value="">Select</option>
        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>O+</option>
        <option>O-</option>
        <option>AB+</option>
        <option>AB-</option>
      </select>

      <label>Blood Component</label>
      <select name="blood_component" required>
        <option value="">Select</option>
        <option>Packed Cell</option>
        <option>Cryoprecipitated (Factor-VIII)</option>
        <option>Platelet Concentrates</option>
        <option>Fresh Plasma</option>
        <option>Washed Red Cell</option>
        <option>Fresh Frozen Plasma</option>
        <option>Leucocyte Poor Blood</option>
      </select>

      <label>Number of Bags</label>
      <input type="number" name="number_of_bags" min="1" required>

      <button type="submit">Book Appointment</button>
    </form>
  </div>
  
 <script src="scripts/bookappoinment.js"></script>
</body>
</html>
